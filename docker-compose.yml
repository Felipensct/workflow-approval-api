services:
  api:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      APP_PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-incicle}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      ASYNC_PROVIDER: bullmq
      ASYNC_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SLA_DEFAULT_HOURS: ${SLA_DEFAULT_HOURS:-24}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-incicle}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-incicle}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  # Serviço one-off: rodar seed dentro do Docker. Uso: docker compose run --rm seed
  seed:
    build:
      context: .
      target: builder
    command: ["npm", "run", "seed"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-incicle}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      api:
        condition: service_started

  # Serviço one-off: seed de carga (10k instâncias) para testes de carga com k6. Uso: docker compose run --rm seed-load
  seed-load:
    build:
      context: .
      target: builder
    command: ["npm", "run", "seed:load"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-incicle}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      api:
        condition: service_started

  # k6: rodar testes de carga dentro do Docker. Uso: docker compose --profile load run --rm k6 load-tests/inbox.test.js
  k6:
    image: grafana/k6:latest
    volumes:
      - .:/app
    working_dir: /app
    environment:
      BASE_URL: http://api:3000
      COMPANY_ID: c1000000-0000-4000-8000-000000000001
      USER_ID: c1000000-0000-4000-8000-000000000001
    depends_on:
      api:
        condition: service_started
    profiles:
      - load
    entrypoint: ["k6", "run"]

  # Testes dentro do container (não exige Node no host). Uso: docker compose run --rm test-unit | test-integration | test-e2e
  test-unit:
    build:
      context: .
      target: builder
    command: ["npm", "run", "test:unit"]
    profiles:
      - test

  test-integration:
    build:
      context: .
      target: builder
    command: ["npm", "run", "test:integration"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-incicle}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      api:
        condition: service_started
    profiles:
      - test

  test-e2e:
    build:
      context: .
      target: builder
    command: ["npm", "run", "test:e2e"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-incicle}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      ASYNC_PROVIDER: bullmq
      ASYNC_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - test

volumes:
  postgres_data:
